<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desafio ABC</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="style.css" >
  </head>

  <body class="container">

    <header>
      <h1 id="title">Desafio ABC</h1>
    </header>

    <main>
        <hr>
        <h5 id="h5_green">Pasa el mouse sobre cada letra para mostrar una cosa referente a la inicial de dicha letra</h5>
        <hr>
        <div class="parent">
            <div id="a"><h3 class="letter">A</h3></div>
            <div id="b"><h3 class="letter">B</h3></div>
            <div id="c"><h3 class="letter">C</h3></div>
            <div id="d"><h3 class="letter">D</h3></div>
            <div id="e"><h3 class="letter">E</h3></div>
            <div id="f"><h3 class="letter">F</h3></div>
            <div id="g"><h3 class="letter">G</h3></div>
            <div id="h"><h3 class="letter">H</h3></div>
            <div id="i"><h3 class="letter">I</h3></div>
            <div id="j"><h3 class="letter">J</h3></div>
            <div id="k"><h3 class="letter">K</h3></div>
            <div id="l"><h3 class="letter">L</h3></div>
            <div id="m"><h3 class="letter">M</h3></div>
            <div id="n"><h3 class="letter">N</h3></div>
            <div id="ñ"><h3 class="letter">Ñ</h3></div>
            <div id="o"><h3 class="letter">O</h3></div>
            <div id="p"><h3 class="letter">P</h3></div>
            <div id="q"><h3 class="letter">Q</h3></div>
            <div id="r"><h3 class="letter">R</h3></div>
            <div id="s"><h3 class="letter">S</h3></div>
            <div id="t"><h3 class="letter">T</h3></div>
            <div id="u"><h3 class="letter">U</h3></div>
            <div id="v"><h3 class="letter">V</h3></div>
            <div id="w"><h3 class="letter">W</h3></div>
            <div id="x"><h3 class="letter_last3 letter">X</h3></div>
            <div id="y"><h3 class="letter_last3 letter">Y</h3></div>
            <div id="z"><h3 class="letter_last3 letter">Z</h3></div>
            <div class="btn-container">
              <button id="randomColorsBtn" class="btn btn-dark">
                Cambiar colores
              </button>
            </div>
        </div>
        
    </main>

    <!-- Bootstrap -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <!-- Script Js -->
    <script src="script.js"></script>
  </body>
</html>
